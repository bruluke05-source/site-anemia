<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Diagnóstico de Anemia</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- 🎨 ESTILO PERSONALIZADO -->
    <style>
    body {
        font-family: Arial, sans-serif;
    }

    .card {
        border-radius: 15px;
    }

    h2 {
        font-weight: bold;
    }
    </style>

</head>

<body style="
    background-image: url('{{ url_for('static', filename='logo.png') }}');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
">
<div style="
    background-color: rgba(255,255,255,0.75);
    min-height: 100vh;
    padding-top: 20px;
">
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 h1">
      🩺 Laboratório para Diagnóstico de Anemias
    </span>
  </div>
</nav>

<div class="container mt-5">

    <div class="card shadow-lg p-4" style="border: none;">
        
        <h2 class="text-center mb-2 text-dark">🩺 Diagnóstico de Anemia</h2>
        <p class="text-center text-muted">Sistema de apoio à decisão clínica</p>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Sexo</label>
                <select name="sexo" class="form-select">
                    <option value="homem">Homem</option>
                    <option value="mulher">Mulher</option>
                </select>
            </div>

            <div class="row">

                <div class="col-md-4 mb-3">
                    <label>RBC</label>
                    <input type="number" step="0.1" name="RBC" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>HGB</label>
                    <input type="number" step="0.1" name="HGB" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>HT</label>
                    <input type="number" step="0.1" name="HT" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>VCM</label>
                    <input type="number" step="0.1" name="VCM" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>HCM</label>
                    <input type="number" step="0.1" name="HCM" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>CHCM</label>
                    <input type="number" step="0.1" name="CHCM" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>Reticulócitos</label>
                    <input type="number" step="0.1" name="RETIC" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>Ferro</label>
                    <input type="number" step="0.1" name="FERRO" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>Vitamina B12</label>
                    <input type="number" step="0.1" name="B12" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>Folato</label>
                    <input type="number" step="0.1" name="FOLATO" class="form-control" required>
                </div>

            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg shadow">🔍 Analisar</button>
            </div>

        </form>

        {% if resultado %}
        <div class="mt-4 p-3 rounded shadow-sm" style="background-color: #e9f2ff;">
            <h4>{{ resultado | safe }}</h4>
        </div>
        {% endif %}

    </div>

</div>

</div>
</body>
</html>
